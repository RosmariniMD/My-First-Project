<!DOCTYPE html>
<html>
<head>
  <title>Wedding RSVP</title>
</head>
<body>

  <h1>Wedding RSVP 💍</h1>

  <form id="rsvpForm">
    <input type="text" name="name" placeholder="Nama anda" required><br><br>

    <select name="attendance">
      <option value="Hadir">Hadir</option>
      <option value="Tidak Hadir">Tidak Hadir</option>
    </select><br><br>

    <input type="number" name="guests" placeholder="Bilangan tetamu"><br><br>

    <button type="submit">Hantar</button>
  </form>

  <p id="msg"></p>
</body>

    <script>
document.getElementById("rsvpForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const data = {
    name: this.name.value,
    attendance: this.attendance.value,
    guests: this.guests.value
  };

  await fetch("https://script.google.com/macros/s/AKfycbzSAxW8gjPAuk_TEnn8EC0S8BW-_2rhKA7EsxKDOZ6z7a6I53WoOmfY4EPcbE-eaiCCFQ/exec", {
    method: "POST",
    body: JSON.stringify(data)
  });

  document.getElementById("msg").innerText = "RSVP berjaya 🎉";
  this.reset();
});
</script>
</html>
