<!DOCTYPE html>
<html>
<head>
  <title>Wedding RSVP</title>
</head>
<body>

  <h1>Wedding RSVP 💍</h1>

  <form id="rsvpForm">
    <input type="text" name="name" placeholder="Nama anda" required><br><br>

    <select name="attendance">
      <option value="Hadir">Hadir</option>
      <option value="Tidak Hadir">Tidak Hadir</option>
    </select><br><br>

    <input type="number" name="guests" placeholder="Bilangan tetamu"><br><br>

    <button type="submit">Hantar</button>
  </form>

  <p id="msg"></p>
</body>

<script>
document.getElementById("rsvpForm").addEventListener("submit", function(e){
  e.preventDefault();

  const form = e.target;

  const data = {
    name: form.name.value,
    attendance: form.attendance.value,
    guests: form.guests.value
  };

  fetch("https://script.google.com/macros/library/d/13-ErHq9IPzqdLxVCI6zm2Paje6D7r5tyxwMhg7CGZBF4DVljpM7XYt45/1", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(response => {
    document.getElementById("msg").innerHTML =
      "💌 RSVP berjaya dihantar! Terima kasih 💍";
    form.reset();
  })
  .catch(error => {
    document.getElementById("msg").innerHTML =
      "❌ Error hantar RSVP. Cuba lagi.";
    console.error(error);
  });

});
</script>
</html>
