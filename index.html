<!DOCTYPE html>
<html>
<head>
  <title>Wedding RSVP</title>
</head>
<body>

  <h1>Wedding RSVP 💍</h1>

  <form id="rsvpForm">
    <input type="text" name="name" placeholder="Nama anda" required><br><br>

    <select name="attendance">
      <option value="Hadir">Hadir</option>
      <option value="Tidak Hadir">Tidak Hadir</option>
    </select><br><br>

    <input type="number" name="guests" placeholder="Bilangan tetamu"><br><br>

    <button type="submit">Hantar</button>
  </form>

  <p id="msg"></p>
</body>

<script>
  
fetch("https://script.google.com/macros/s/AKfycbzSAxW8gjPAuk_TEnn8EC0S8BW-_2rhKA7EsxKDOZ6z7a6I53WoOmfY4EPcbE-eaiCCFQ/exec", {
  method: "POST",
  mode: "no-cors",
  body: new URLSearchParams({
    name: form.name.value,
    attendance: form.attendance.value,
    guests: form.guests.value
  })
});
.then(res => res.text())
.then(response => {
  document.getElementById("msg").innerHTML =
    "💌 RSVP berjaya dihantar! Terima kasih 💍";
  form.reset();
})
.catch(error => {
  document.getElementById("msg").innerHTML =
    "❌ Error hantar RSVP. Cuba lagi.";
  console.error(error);
});
</script>
</html>
